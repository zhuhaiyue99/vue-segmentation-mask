<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vue-segmentation-mask</title>
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">Loading...</div>
    <script>
      window.$docsify = {
        name: 'vue-segmentation-mask',
        repo: '',
        loadSidebar: 'sidebar.md',
        loadNavbar: 'navbar.md',
        coverpage: 'coverpage.md',
        onlyCover: false,
        subMaxLevel: 3,
        auto2top: true,
        maxLevel: 4,
        homepage: 'guide.md',
        search: {
          maxAge: 86400000,
          paths: 'auto',
          placeholder: '搜索文档',
          noData: '没有找到结果',
          depth: 4
        },
        copyCode: {
          buttonText: '复制',
          errorText: '复制失败',
          successText: '已复制'
        },
        pagination: {
          previousText: '上一页',
          nextText: '下一页',
          crossChapter: true
        },
        tabs: {
          persist: true,
          sync: true,
          theme: 'classic',
          tabComments: true,
          tabHeadings: true
        },
        plugins: [
          function (hook) {
            hook.beforeEach(function (content, next) {
              if (location.hash.replace(/^#\/?/, '').replace(/\.md$/, '') === 'demo') {
                location.replace('./demo/index.html')
                return
              }

              next(content)
            })
          }
        ]
      }
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  </body>
</html>
